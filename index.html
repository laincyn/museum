<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Museum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="black-screen"></div>
    <div id="dynamic-lighting"></div>
    <div id="vignette"></div>

    <div id="title-container" class="intro">
        <h1 id="title">Virtual Museum</h1>
        <p id="subtitle">Made by BSCS 1-5</p>
    </div>

    <div id="camera-stage">
        <div id="museum-wall"></div>
        <div id="museum-floor"></div>

        <div id="art-gallery">
            <div class="art-piece" data-era="0" style="left: 400px;">
                <div class="art-hint">▲ HOLD UP</div>
                <div class="wall-art-meta">
                    <h3 class="wall-art-title"></h3>
                    <p class="wall-art-author"></p>
                </div>
                <img class="art-canvas" src="museum_arts/art1.png">
                <img class="art-frame" src="museum_arts/frame.png">
            </div>
            <div class="art-piece" data-era="1" style="left: 1000px;">
                <div class="art-hint">▲ HOLD UP</div>
                <div class="wall-art-meta">
                    <h3 class="wall-art-title"></h3>
                    <p class="wall-art-author"></p>
                </div>
                <img class="art-canvas" src="museum_arts/art2.png">
                <img class="art-frame" src="museum_arts/frame.png">
            </div>
            <div class="art-piece" data-era="2" style="left: 1600px;">
                <div class="art-hint">▲ HOLD UP</div>
                <div class="wall-art-meta">
                    <h3 class="wall-art-title"></h3>
                    <p class="wall-art-author"></p>
                </div>
                <img class="art-canvas" src="museum_arts/art3.png">
                <img class="art-frame" src="museum_arts/frame.png">
            </div>
            <div class="art-piece" data-era="3" style="left: 2200px;">
                <div class="art-hint">▲ HOLD UP</div>
                <div class="wall-art-meta">
                    <h3 class="wall-art-title"></h3>
                    <p class="wall-art-author"></p>
                </div>
                <img class="art-canvas" src="museum_arts/art4.png">
                <img class="art-frame" src="museum_arts/frame.png">
            </div>
            <div class="art-piece" data-era="4" style="left: 2800px;">
                <div class="art-hint">▲ HOLD UP</div>
                <div class="wall-art-meta">
                    <h3 class="wall-art-title"></h3>
                    <p class="wall-art-author"></p>
                </div>
                <img class="art-canvas" src="museum_arts/art5.png">
                <img class="art-frame" src="museum_arts/frame.png">
            </div>
        </div>

        <div id="particles-container"></div>

        <div id="player-container">
            <img id="player-reflection" src="char_images/S.png" alt="Reflection">
            <div id="player-shadow"></div>
            <img id="player-sprite" src="char_images/S.png" alt="Player Character">
        </div>
    </div>

    <div id="mobile-controls">
        <div class="mobile-btn" id="btn-left">◀</div>
        <div class="mobile-btn" id="btn-up">▲</div>
        <div class="mobile-btn" id="btn-right">▶</div>
    </div>

    <div id="focus-overlay">
        
        <div id="era-info">
            <h2 id="era-title">Era Title</h2>
            <p id="era-focus"><strong>Focus:</strong> <span>...</span></p>
            <div class="swipe-hint">◀ Press A or D to swipe gallery ▶</div>
        </div>

        <div id="focus-layout">
            <div id="focus-left">
                <div id="focused-art-container">
                    <div class="art-glow"></div>
                    <div id="slider-mask">
                        <div id="slider-track"></div>
                    </div>
                    <img id="focused-frame" src="museum_arts/frame.png">
                </div>
                <div id="art-details">
                    <h2 id="art-title">Artwork Title</h2>
                    <h4 id="art-author">Author Name • Year</h4>
                </div>
            </div>
            
            <div id="focus-right">
                <p id="art-description">Loading historical data...</p>
            </div>
        </div>

        <div id="super-zoom-ui">
            <div class="sz-header">
                <h2 id="sz-title">Artwork Title</h2>
                <span id="sz-author">Author Name • Year</span>
            </div>
            <div class="sz-footer">
                <p id="sz-desc">Description goes here...</p>
            </div>
        </div>

    </div>

    <audio id="bg-music" loop><source src="mp3/beneaththerain.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-footsteps" loop><source src="mp3/footsteps.mp3" type="audio/mpeg"></audio>

    <div id="volume-control">
        <span id="mute-icon">🔊</span>
        <input range-input" id="volume-slider" min="0" max="1" step="0.01" value="0.2">
    </div>

    <script src="script.js"></script>
</body>
</html>
